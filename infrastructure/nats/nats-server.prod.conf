# AI Street Market — NATS Server Production Configuration
# Optimized for Railway deployment with persistent JetStream.

# Client connections
listen: 0.0.0.0:4222

# HTTP monitoring
http_port: 8222

# JetStream — persistent message streams
jetstream {
    store_dir: /data/jetstream
    max_mem: 256MB
    max_file: 1GB
}

# Logging
debug: false
trace: false
logtime: true

# Connection limits
max_connections: 100
max_payload: 1MB

# Timeouts
ping_interval: 30s
ping_max: 3
write_deadline: 5s

