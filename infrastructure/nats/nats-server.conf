# AI Street Market — NATS Server Configuration (v2)
# NKey-based authentication with topic permissions per role.

# Client connections
listen: 0.0.0.0:4222

# HTTP monitoring
http_port: 8222

# WebSocket for frontend viewer
websocket {
    listen: "0.0.0.0:8080"
    no_tls: true
}

# JetStream — persistent message streams
jetstream {
    store_dir: /data/jetstream
    max_mem: 256MB
    max_file: 1GB
}

# Logging
debug: false
trace: false
logtime: true

# ============================================================
# NKey Authentication
# ============================================================
# NKey auth is configured via authorization block.
# Each role has different publish/subscribe permissions.
#
# To generate NKeys:
#   nk -gen user > system.nk
#   nk -gen user > market-agent.nk
#   nk -gen user > trading-agent.nk
#   nk -gen user > viewer.nk
#
# Then extract the public key:
#   nk -inkey system.nk -pubout
#
# For development, we use a permissive config.
# For production, uncomment the authorization block below
# and replace the NKey values with your generated keys.
# ============================================================

# DEVELOPMENT MODE: No auth (comment out for production)
# All clients can publish and subscribe to all subjects.

# PRODUCTION MODE: Uncomment below and set real NKey public keys.
#
# authorization {
#     users = [
#         # System role — tick clock, ledger processor
#         {
#             nkey: "UAXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
#             permissions: {
#                 publish: ["system.>", "market.>", "agent.>"]
#                 subscribe: ["system.>", "market.>", "agent.>"]
#             }
#         }
#
#         # Market agent role — Governor, Banker, Nature, Meteo, etc.
#         {
#             nkey: "UAXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
#             permissions: {
#                 publish: ["market.>", "system.ledger", "agent.>"]
#                 subscribe: ["market.>", "system.>", "agent.>"]
#             }
#         }
#
#         # Trading agent role — external agents
#         {
#             nkey: "UAXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
#             permissions: {
#                 publish: ["market.square", "market.trades", "agent.*.inbox"]
#                 subscribe: ["market.>", "agent.*.inbox"]
#             }
#         }
#
#         # Viewer role — read-only WebSocket clients
#         {
#             nkey: "UAXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
#             permissions: {
#                 publish: { deny: ">" }
#                 subscribe: ["market.>"]
#             }
#         }
#     ]
# }
