name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: docker.io
  IMAGE_PREFIX: hugocasqueiromoredevsai/streetmarket

jobs:
  # ============================================================
  # Lint — ruff + mypy
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy libs/streetmarket

  # ============================================================
  # Test — pytest (397+ tests)
  # ============================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: "sk-or-test-dummy-key"
      OPENROUTER_API_BASE: "https://openrouter.ai/api/v1"
      DEFAULT_MODEL: "test/dummy-model"
      DEFAULT_MAX_TOKENS: "400"
      DEFAULT_TEMPERATURE: "0.7"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ============================================================
  # Build — Docker images (push to main/develop only)
  # ============================================================
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Docker metadata (market)
        id: meta-market
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-market
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (ws-bridge)
        id: meta-bridge
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ws-bridge
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (nats)
        id: meta-nats
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-nats
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push market image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: market
          push: true
          tags: ${{ steps.meta-market.outputs.tags }}
          labels: ${{ steps.meta-market.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ws-bridge image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ws-bridge
          push: true
          tags: ${{ steps.meta-bridge.outputs.tags }}
          labels: ${{ steps.meta-bridge.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push nats image
        uses: docker/build-push-action@v6
        with:
          context: infrastructure/
          file: infrastructure/Dockerfile.nats
          push: true
          tags: ${{ steps.meta-nats.outputs.tags }}
          labels: ${{ steps.meta-nats.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy Staging — manual approval required
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deploying to Railway staging environment..."
          echo "Market image: ${{ env.IMAGE_PREFIX }}-market:sha-${GITHUB_SHA::7}"
          echo "WS-Bridge image: ${{ env.IMAGE_PREFIX }}-ws-bridge:sha-${GITHUB_SHA::7}"
          echo "NATS image: ${{ env.IMAGE_PREFIX }}-nats:sha-${GITHUB_SHA::7}"
          echo ""
          echo "Railway deployment commands would go here."
          echo "Configure via Railway dashboard or CLI once project is set up."
          # railway up --service market --image $IMAGE_PREFIX-market:sha-${GITHUB_SHA::7}
          # railway up --service ws-bridge --image $IMAGE_PREFIX-ws-bridge:sha-${GITHUB_SHA::7}
          # railway up --service nats --image $IMAGE_PREFIX-nats:sha-${GITHUB_SHA::7}

  # ============================================================
  # Deploy Production — manual approval, main branch only
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deploying to Railway production environment..."
          echo "Market image: ${{ env.IMAGE_PREFIX }}-market:sha-${GITHUB_SHA::7}"
          echo "WS-Bridge image: ${{ env.IMAGE_PREFIX }}-ws-bridge:sha-${GITHUB_SHA::7}"
          echo "NATS image: ${{ env.IMAGE_PREFIX }}-nats:sha-${GITHUB_SHA::7}"
          echo ""
          echo "Railway deployment commands would go here."
          echo "Configure via Railway dashboard or CLI once project is set up."
          # railway up --service market --image $IMAGE_PREFIX-market:sha-${GITHUB_SHA::7}
          # railway up --service ws-bridge --image $IMAGE_PREFIX-ws-bridge:sha-${GITHUB_SHA::7}
          # railway up --service nats --image $IMAGE_PREFIX-nats:sha-${GITHUB_SHA::7}
